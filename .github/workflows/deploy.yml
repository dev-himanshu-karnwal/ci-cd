name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-app:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            echo "Pulling latest image"
            docker pull karnwalhimanshu/ci-cd-app:latest

            echo "Restarting services"
            docker compose down
            docker compose up -d

            echo "Deployment complete"
          EOF